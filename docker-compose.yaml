services:
  base: &base
    image: chatwoot/chatwoot:latest
    volumes:
      - chatwoot_storage:/app/storage

  # 🔧 Init Container - ADICIONADO para setup automático
  chatwoot-init:
    <<: *base
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - RAILS_ENV=production
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - CHATWOOT_ADMIN_EMAIL=${CHATWOOT_ADMIN_EMAIL:-admin@localhost.com}
      - CHATWOOT_ADMIN_PASSWORD=${CHATWOOT_ADMIN_PASSWORD}
    command: >
      sh -c "
      echo '🔧 Iniciando setup do Chatwoot...' &&
      bundle exec rails db:prepare &&
      echo '👤 Criando usuário admin...' &&
      bundle exec rails runner \"
      begin
        admin_email = ENV['CHATWOOT_ADMIN_EMAIL'] || 'admin@localhost.com'
        admin_password = ENV['CHATWOOT_ADMIN_PASSWORD']
        if User.where(email: admin_email).exists?
          puts '✅ Usuário admin já existe'
        else
          user = User.create!(
            name: 'Administrador',
            email: admin_email,
            password: admin_password,
            password_confirmation: admin_password,
            confirmed_at: Time.current
          )
          account = Account.create!(name: 'Minha Empresa')
          AccountUser.create!(account: account, user: user, role: 'administrator')
          puts '✅ Usuário admin criado: ' + admin_email
        end
      rescue => e
        puts 'Erro: ' + e.message
      end
      \" &&
      echo '✅ Setup concluído!'
      "
    restart: "no"

  rails:
    <<: *base
    depends_on:
      chatwoot-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '127.0.0.1:3000:3000'
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
      # Configurações do Chatwoot
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - FRONTEND_URL=http://localhost:3000
      - REQUIRE_EMAIL_CONFIRMATION=false
      - ENABLE_ACCOUNT_SIGNUP=true
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    entrypoint: docker/entrypoints/rails.sh
    command: ['bundle', 'exec', 'rails', 's', '-p', '3000', '-b', '0.0.0.0']
    restart: always
    networks:
      - default

  sidekiq:
    <<: *base
    depends_on:
      chatwoot-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
      # Configurações do Chatwoot
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    command: ['bundle', 'exec', 'sidekiq', '-C', 'config/sidekiq.yml']
    restart: always
    networks:
      - default

  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    ports:
      - '127.0.0.1:5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-chatwoot}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    # ADICIONADO: Health check para aguardar postgres ficar pronto
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chatwoot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      default:
        aliases:
          - postgres
          - auto-zap-postgres-1

  redis:
    image: redis:alpine
    restart: always
    command: ["sh", "-c", "redis-server --requirepass \"${REDIS_PASSWORD}\""]
    volumes:
      - redis_data:/data
    ports:
      - '127.0.0.1:6379:6379'
    # ADICIONADO: Health check para aguardar redis ficar pronto
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: always
    ports:
      - '127.0.0.1:5678:5678'
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_SECURE_COOKIE=false
      - TZ=America/Sao_Paulo
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - default

  evolution-api:
    container_name: evolution_api
    image: atendai/evolution-api:latest
    restart: always
    ports:
      - '127.0.0.1:8081:8080'
    environment:
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - SERVER_URL=http://localhost:8081
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${EVOLUTION_DB_USER:-evolution_user}:${EVOLUTION_DB_PASSWORD}@evolution-db:5432/evolution?schema=public
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://evolution-redis:6379/6
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - LANGUAGE=pt-BR
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1032622985
    volumes:
      - evolution_store:/evolution/store
      - evolution_instances:/evolution/instances
    depends_on:
      evolution-db:
        condition: service_healthy
      evolution-redis:
        condition: service_healthy
    networks:
      - default

  evolution-db:
    container_name: evolution_db
    image: postgres:15
    restart: always
    environment:
      - POSTGRES_USER=${EVOLUTION_DB_USER:-evolution_user}
      - POSTGRES_PASSWORD=${EVOLUTION_DB_PASSWORD}
      - POSTGRES_DB=evolution
    volumes:
      - evolution_db_data:/var/lib/postgresql/data
    # ADICIONADO: Health check para aguardar postgres ficar pronto
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${EVOLUTION_DB_USER:-evolution_user} -d evolution"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  evolution-redis:
    container_name: evolution_redis
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    volumes:
      - evolution_redis_data:/data
    # ADICIONADO: Health check para aguardar redis ficar pronto
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  # Workspace Laravel para FAQ System
  faq-workspace:
    container_name: faq_workspace
    image: laravelsail/php83-composer:latest
    restart: unless-stopped
    working_dir: /var/www/faq-cabemce
    ports:
      - '127.0.0.1:8080:8000'
    volumes:
      - ./faq-cabemce:/var/www/faq-cabemce
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${FAQ_DB_NAME:-faq_system}
      - DB_USERNAME=${FAQ_DB_USER:-postgres}
      - DB_PASSWORD=${FAQ_DB_PASSWORD:-${POSTGRES_PASSWORD}}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      default:
        aliases:
          - faq-workspace
          - faq_workspace
    command: bash -c "apt-get update && apt-get install -y postgresql-client libpq-dev libicu-dev && docker-php-ext-install pdo_pgsql pgsql intl && cd /var/www/faq-cabemce && php artisan serve --host=0.0.0.0 --port=8000"

  # 🌐 Ngrok - Túnel para expor serviços localmente
  ngrok:
    container_name: ngrok_tunnel
    image: ngrok/ngrok:latest
    restart: unless-stopped
    ports:
      - '4040:4040'  # Interface web do ngrok
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}  # Token do ngrok (obrigatório)
    command:
      - "start"
      - "--authtoken"
      - "${NGROK_AUTHTOKEN}"
      - "--config"
      - "/etc/ngrok.yml"
      - "--all"
    volumes:
      - ./ngrok.yml:/etc/ngrok.yml:ro
    depends_on:
      - faq-workspace
    networks:
      - default
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Permite acesso ao host a partir do container (macOS/Windows)

volumes:
  chatwoot_storage:
  postgres_data:
  redis_data:
  n8n_data:
  evolution_store:
  evolution_instances:
  evolution_db_data:
  evolution_redis_data:

networks:
  default:
    name: auto-zap-network
    driver: bridge